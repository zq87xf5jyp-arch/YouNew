name: Repository Backup

on:
  schedule:
    - cron: "43 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-backup
  cancel-in-progress: true

jobs:
  backup:
    name: Create verified Git bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create and verify the repository snapshot
        env:
          BACKUP_TIMESTAMP: run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
        run: scripts/create-repository-backup.sh "$RUNNER_TEMP/repository-backup"
      - name: Store the verified snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/repository-backup/
          if-no-files-found: error
          retention-days: 14
