name: Product CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "YouNew/**"
      - "YouNewTests/**"
      - "YouNewUITests/**"
      - "YouNew.xcodeproj/**"
      - "scripts/**"
      - "BuildWeekFix/**"
      - "Design/AppIcon/**"
      - "ASSET_CREDITS.md"
      - "MEDIA_ATTRIBUTION.md"
      - "PLACE_MEDIA_RENDER_AUDIT.md"
      - "admin-dashboard/public-site/**"
      - "BackendExamples/**"
      - ".github/workflows/product-ci.yml"
      - ".github/workflows/secret-scan.yml"
      - ".github/workflows/repository-backup.yml"
      - ".github/workflows/release-journal.yml"
      - "docs/REPOSITORY_GOVERNANCE.md"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS build and unit tests
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Run repository static QA
        run: scripts/run-static-qa.sh
      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(python3 - <<'PY'
          import json
          import re
          import subprocess

          payload = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          )
          iphones = [
              (
                  tuple(int(part) for part in re.search(r"iOS-(\d+(?:-\d+)*)$", runtime).group(1).split("-")),
                  device,
              )
              for runtime, devices in payload.get("devices", {}).items()
              if re.search(r"iOS-(\d+(?:-\d+)*)$", runtime)
              for device in devices
              if device.get("isAvailable", True) and device.get("name", "").startswith("iPhone")
          ]
          if not iphones:
              raise SystemExit("No available iPhone simulator was found")
          _, preferred = max(
              iphones,
              key=lambda candidate: (
                  candidate[0],
                  candidate[1]["name"] == "iPhone 17 Pro",
              ),
          )
          print(preferred["udid"])
          PY
          )"
          echo "id=$device_id" >> "$GITHUB_OUTPUT"
      - name: Build the app and run unit tests
        env:
          NSUnbufferedIO: "YES"
        run: |
          set -o pipefail
          xcodebuild \
            -project YouNew.xcodeproj \
            -scheme YouNew \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -only-testing:YouNewTests \
            -parallel-testing-enabled NO \
            -resultBundlePath "$RUNNER_TEMP/YouNewTests.xcresult" \
            test \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload failed unit-test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-unit-test-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/YouNewTests.xcresult
          if-no-files-found: ignore
          retention-days: 14
      - name: Build the unsigned Release configuration
        run: |
          set -o pipefail
          xcodebuild \
            -project YouNew.xcodeproj \
            -scheme YouNew \
            -configuration Release \
            -destination "generic/platform=iOS" \
            build \
            CODE_SIGNING_ALLOWED=NO

  public-site:
    name: Public site validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: admin-dashboard/public-site
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Enable the pinned package manager
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the full pre-deployment validation
        run: pnpm predeploy:check

  backend-contracts:
    name: Backend security contract tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Run backend security contracts
        run: node --test BackendExamples/cloudflare-worker-ai-proxy.test.mjs
