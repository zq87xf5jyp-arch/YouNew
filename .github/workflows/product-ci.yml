name: Product CI

on:
  pull_request:
    paths:
      - "YouNew/**"
      - "YouNewTests/**"
      - "YouNewUITests/**"
      - "YouNew.xcodeproj/**"
      - "scripts/**"
      - "BuildWeekFix/**"
      - "Design/AppIcon/**"
      - "ASSET_CREDITS.md"
      - "MEDIA_ATTRIBUTION.md"
      - "PLACE_MEDIA_RENDER_AUDIT.md"
      - "admin-dashboard/public-site/**"
      - ".github/workflows/product-ci.yml"
  push:
    paths:
      - "YouNew/**"
      - "YouNewTests/**"
      - "YouNewUITests/**"
      - "YouNew.xcodeproj/**"
      - "scripts/**"
      - "BuildWeekFix/**"
      - "Design/AppIcon/**"
      - "ASSET_CREDITS.md"
      - "MEDIA_ATTRIBUTION.md"
      - "PLACE_MEDIA_RENDER_AUDIT.md"
      - "admin-dashboard/public-site/**"
      - ".github/workflows/product-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS build and unit tests
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run repository static QA
        run: scripts/run-static-qa.sh
      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(python3 - <<'PY'
          import json
          import re
          import subprocess

          payload = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          )
          iphones = [
              (
                  tuple(int(part) for part in re.search(r"iOS-(\d+(?:-\d+)*)$", runtime).group(1).split("-")),
                  device,
              )
              for runtime, devices in payload.get("devices", {}).items()
              if re.search(r"iOS-(\d+(?:-\d+)*)$", runtime)
              for device in devices
              if device.get("isAvailable", True) and device.get("name", "").startswith("iPhone")
          ]
          if not iphones:
              raise SystemExit("No available iPhone simulator was found")
          _, preferred = max(
              iphones,
              key=lambda candidate: (
                  candidate[0],
                  candidate[1]["name"] == "iPhone 17 Pro",
              ),
          )
          print(preferred["udid"])
          PY
          )"
          echo "id=$device_id" >> "$GITHUB_OUTPUT"
      - name: Build the app and run unit tests
        env:
          NSUnbufferedIO: "YES"
        run: |
          set -o pipefail
          xcodebuild \
            -project YouNew.xcodeproj \
            -scheme YouNew \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -only-testing:YouNewTests \
            -parallel-testing-enabled NO \
            test \
            CODE_SIGNING_ALLOWED=NO

  public-site:
    name: Public site validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: admin-dashboard/public-site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Enable the pinned package manager
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the full pre-deployment validation
        run: pnpm predeploy:check
