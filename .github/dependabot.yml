version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/admin-dashboard/public-site"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      public-site:
        patterns:
          - "*"
