<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: dark green field -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#1E4D2B" stroke="#5C4508" stroke-width="2.5"/>
  <!-- Golden stork body -->
  <ellipse cx="100" cy="130" rx="24" ry="18" fill="#D4AF37"/>
  <!-- Neck -->
  <path d="M100,112 Q112,90 118,72" stroke="#D4AF37" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <circle cx="120" cy="66" r="10" fill="#D4AF37"/>
  <!-- Beak -->
  <path d="M128,63 L148,60" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="88" y1="146" x2="82" y2="178" stroke="#D4AF37" stroke-width="6" stroke-linecap="round"/>
  <line x1="110" y1="146" x2="104" y2="178" stroke="#D4AF37" stroke-width="6" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="72" y1="178" x2="94" y2="178" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="178" x2="116" y2="178" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
