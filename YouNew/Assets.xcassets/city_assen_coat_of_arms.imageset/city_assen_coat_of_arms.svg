<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: red field -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#AE1C28" stroke="#5C3800" stroke-width="2.5"/>
  <!-- Golden stag (simplified) -->
  <!-- Body -->
  <ellipse cx="100" cy="148" rx="28" ry="20" fill="#D4AF37"/>
  <!-- Neck -->
  <path d="M100,130 Q110,112 115,96" stroke="#D4AF37" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <ellipse cx="117" cy="90" rx="13" ry="10" fill="#D4AF37"/>
  <!-- Snout -->
  <ellipse cx="128" cy="92" rx="7" ry="5" fill="#C8840A"/>
  <!-- Antlers -->
  <path d="M110,80 Q104,62 100,48" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M104,68 Q96,56 92,46" stroke="#D4AF37" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M106,64 Q110,50 116,42" stroke="#D4AF37" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M124,80 Q132,62 136,48" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M132,66 Q140,54 144,44" stroke="#D4AF37" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <line x1="78" y1="164" x2="70" y2="188" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <line x1="92" y1="166" x2="86" y2="190" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <line x1="108" y1="166" x2="114" y2="190" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <line x1="122" y1="164" x2="130" y2="188" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <!-- White tail -->
  <ellipse cx="72" cy="140" rx="8" ry="5" fill="white" transform="rotate(-20 72 140)"/>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
