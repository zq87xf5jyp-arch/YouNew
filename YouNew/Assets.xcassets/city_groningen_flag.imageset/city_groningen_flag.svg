<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Groningen flag: red field with golden eagle (Groningen eagle) -->
  <rect width="300" height="200" fill="#AE1C28"/>
  <!-- Stylized eagle (Groningse Adelaar) in gold -->
  <!-- Eagle body -->
  <ellipse cx="150" cy="115" rx="32" ry="38" fill="#D4AF37"/>
  <!-- Eagle head -->
  <circle cx="150" cy="72" r="20" fill="#D4AF37"/>
  <!-- Beak (facing right) -->
  <path d="M166,70 L186,74 L166,80 Z" fill="#C8840A"/>
  <!-- Eagle tail feathers (downward spread) -->
  <path d="M118,148 L100,180 M150,152 L150,182 M182,148 L200,180" stroke="#D4AF37" stroke-width="10" stroke-linecap="round"/>
  <!-- Left wing (spread) -->
  <path d="M118,110 Q70,80 45,100 Q70,120 118,128" fill="#D4AF37"/>
  <!-- Right wing (spread) -->
  <path d="M182,110 Q230,80 255,100 Q230,120 182,128" fill="#D4AF37"/>
  <!-- Wing detail lines -->
  <line x1="78" y1="95" x2="118" y2="115" stroke="#C8840A" stroke-width="3" opacity="0.5"/>
  <line x1="222" y1="95" x2="182" y2="115" stroke="#C8840A" stroke-width="3" opacity="0.5"/>
  <!-- Eagle legs -->
  <line x1="138" y1="150" x2="128" y2="172" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <line x1="162" y1="150" x2="172" y2="172" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <!-- Talons -->
  <path d="M116,172 L132,172 M124,172 L120,182" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
  <path d="M168,172 L184,172 M176,172 L180,182" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
</svg>
