<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: deep blue field -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#003082" stroke="#5C3800" stroke-width="2.5"/>
  <!-- Crowned golden eagle (displayed) -->
  <!-- Body -->
  <ellipse cx="100" cy="138" rx="22" ry="26" fill="#D4AF37"/>
  <!-- Head -->
  <circle cx="100" cy="102" r="14" fill="#D4AF37"/>
  <!-- Crown on eagle -->
  <rect x="86" y="86" width="28" height="7" rx="2" fill="#D4AF37"/>
  <rect x="86" y="79" width="7" height="9" rx="2" fill="#D4AF37"/>
  <rect x="96.5" y="79" width="7" height="9" rx="2" fill="#D4AF37"/>
  <rect x="107" y="79" width="7" height="9" rx="2" fill="#D4AF37"/>
  <!-- Beak -->
  <path d="M112,100 L124,103 L112,108 Z" fill="#C8840A"/>
  <!-- Left wing -->
  <path d="M78,126 Q48,108 30,118 Q48,134 78,140" fill="#D4AF37"/>
  <!-- Right wing -->
  <path d="M122,126 Q152,108 170,118 Q152,134 122,140" fill="#D4AF37"/>
  <!-- Tail feathers -->
  <path d="M83,161 L74,188 M100,164 L100,190 M117,161 L126,188" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
