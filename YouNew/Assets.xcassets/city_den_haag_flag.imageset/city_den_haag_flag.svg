<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Den Haag (The Hague) flag: dark green field with golden stork (heron) -->
  <rect width="300" height="200" fill="#1E4D2B"/>
  <!-- Stork/heron silhouette (stylized, facing right) -->
  <!-- Body -->
  <ellipse cx="155" cy="110" rx="30" ry="22" fill="#D4AF37"/>
  <!-- Neck -->
  <path d="M155,90 Q165,70 175,55" stroke="#D4AF37" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <circle cx="178" cy="50" r="12" fill="#D4AF37"/>
  <!-- Beak -->
  <path d="M186,48 L210,44" stroke="#D4AF37" stroke-width="6" stroke-linecap="round"/>
  <!-- Long legs -->
  <line x1="140" y1="130" x2="132" y2="170" stroke="#D4AF37" stroke-width="8" stroke-linecap="round"/>
  <line x1="165" y1="130" x2="158" y2="170" stroke="#D4AF37" stroke-width="8" stroke-linecap="round"/>
  <!-- Feet (horizontal toes) -->
  <line x1="122" y1="170" x2="146" y2="170" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="170" x2="172" y2="170" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
  <!-- Wing fold hint -->
  <path d="M130,100 Q150,88 175,95" fill="none" stroke="#1E4D2B" stroke-width="4" opacity="0.6"/>
</svg>
