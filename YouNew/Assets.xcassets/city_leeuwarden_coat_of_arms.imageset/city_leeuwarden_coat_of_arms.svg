<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: white field with blue Frisian wavy stripes -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#FFFFFF" stroke="#5C3800" stroke-width="2.5"/>
  <!-- Blue wavy stripes inside shield (clipped to shield shape) -->
  <clipPath id="shieldClip">
    <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z"/>
  </clipPath>
  <g clip-path="url(#shieldClip)">
    <path d="M20,45 Q60,32 100,45 Q140,58 180,45 L180,66 Q140,79 100,66 Q60,53 20,66 Z" fill="#003B8E"/>
    <path d="M20,87 Q60,74 100,87 Q140,100 180,87 L180,108 Q140,121 100,108 Q60,95 20,108 Z" fill="#003B8E"/>
    <path d="M20,128 Q60,115 100,128 Q140,141 180,128 L180,150 Q140,163 100,150 Q60,137 20,150 Z" fill="#003B8E"/>
    <path d="M20,170 Q60,157 100,170 Q140,183 180,170 L180,232 Q100,250 20,232 Z" fill="#003B8E"/>
  </g>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
