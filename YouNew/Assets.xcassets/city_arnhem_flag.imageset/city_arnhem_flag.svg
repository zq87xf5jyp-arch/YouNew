<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Arnhem flag: azure (blue) field with golden Gelderland eagle -->
  <rect width="300" height="200" fill="#003B8E"/>
  <!-- Eagle body -->
  <ellipse cx="150" cy="118" rx="30" ry="36" fill="#D4AF37"/>
  <!-- Head -->
  <circle cx="150" cy="77" r="19" fill="#D4AF37"/>
  <!-- Beak (hooked) -->
  <path d="M165,74 L183,79 L165,85 Z" fill="#C8840A"/>
  <!-- Crown (simple mural) -->
  <rect x="133" y="56" width="34" height="9" rx="2" fill="#D4AF37"/>
  <rect x="133" y="47" width="9" height="11" rx="2" fill="#D4AF37"/>
  <rect x="146" y="47" width="9" height="11" rx="2" fill="#D4AF37"/>
  <rect x="159" y="47" width="9" height="11" rx="2" fill="#D4AF37"/>
  <!-- Left wing (spread) -->
  <path d="M120,108 Q72,76 44,94 Q70,120 120,128" fill="#D4AF37"/>
  <!-- Right wing -->
  <path d="M180,108 Q228,76 256,94 Q230,120 180,128" fill="#D4AF37"/>
  <!-- Wing feather lines -->
  <line x1="68" y1="90" x2="118" y2="112" stroke="#C8840A" stroke-width="2.5" opacity="0.45"/>
  <line x1="232" y1="90" x2="182" y2="112" stroke="#C8840A" stroke-width="2.5" opacity="0.45"/>
  <!-- Tail -->
  <path d="M124,152 L110,178 M150,155 L150,180 M176,152 L190,178" stroke="#D4AF37" stroke-width="9" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="136" y1="152" x2="125" y2="172" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <line x1="164" y1="152" x2="175" y2="172" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
</svg>
