<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: gold/yellow field -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#E8B800" stroke="#5C3800" stroke-width="2.5"/>
  <!-- Black double-headed eagle body -->
  <ellipse cx="100" cy="135" rx="20" ry="25" fill="#1A1A1A"/>
  <!-- Left head -->
  <circle cx="82" cy="96" r="14" fill="#1A1A1A"/>
  <path d="M70,93 L56,97 L70,101 Z" fill="#8B6914"/>
  <rect x="68" y="80" width="26" height="7" rx="2" fill="#D4AF37"/>
  <rect x="68" y="73" width="7" height="9" rx="2" fill="#D4AF37"/>
  <rect x="79" y="73" width="7" height="9" rx="2" fill="#D4AF37"/>
  <rect x="89" y="73" width="7" height="9" rx="2" fill="#D4AF37"/>
  <!-- Right head -->
  <circle cx="118" cy="96" r="14" fill="#1A1A1A"/>
  <path d="M130,93 L144,97 L130,101 Z" fill="#8B6914"/>
  <rect x="106" y="80" width="26" height="7" rx="2" fill="#D4AF37"/>
  <rect x="106" y="73" width="7" height="9" rx="2" fill="#D4AF37"/>
  <rect x="117" y="73" width="7" height="9" rx="2" fill="#D4AF37"/>
  <rect x="127" y="73" width="7" height="9" rx="2" fill="#D4AF37"/>
  <!-- Wings -->
  <path d="M80,122 Q50,106 34,116 Q50,130 80,136" fill="#1A1A1A"/>
  <path d="M120,122 Q150,106 166,116 Q150,130 120,136" fill="#1A1A1A"/>
  <!-- Tail -->
  <path d="M82,158 L72,184 M100,161 L100,186 M118,158 L128,184" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
