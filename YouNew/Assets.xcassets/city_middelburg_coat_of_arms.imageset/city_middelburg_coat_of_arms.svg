<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: azure field -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#003B8E" stroke="#5C3800" stroke-width="2.5"/>
  <!-- White Zeeland lion (rampant, upper body, lower by waves) -->
  <!-- Upper lion body -->
  <ellipse cx="100" cy="118" rx="20" ry="22" fill="white"/>
  <!-- Head -->
  <circle cx="100" cy="82" r="16" fill="white"/>
  <!-- Mane -->
  <circle cx="100" cy="82" r="21" fill="none" stroke="white" stroke-width="8"/>
  <circle cx="100" cy="82" r="12" fill="white"/>
  <!-- Crown on lion -->
  <rect x="82" y="58" width="36" height="8" rx="2" fill="#D4AF37"/>
  <rect x="82" y="50" width="8" height="10" rx="2" fill="#D4AF37"/>
  <rect x="96" y="50" width="8" height="10" rx="2" fill="#D4AF37"/>
  <rect x="110" y="50" width="8" height="10" rx="2" fill="#D4AF37"/>
  <!-- Raised paw (dexter) -->
  <path d="M80,108 Q60,94 58,80 Q62,70 70,74 Q76,86 82,100" fill="white"/>
  <!-- Right paw -->
  <path d="M120,108 Q140,94 142,80 Q138,70 130,74 Q124,86 118,100" fill="white"/>
  <!-- Waves at base (Zeeland) -->
  <clipPath id="shieldClipM">
    <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z"/>
  </clipPath>
  <g clip-path="url(#shieldClipM)">
    <path d="M20,148 Q60,136 100,148 Q140,160 180,148 L180,232 Q100,250 20,232 Z" fill="#003B8E"/>
    <path d="M20,156 Q60,144 100,156 Q140,168 180,156 L180,232 Q100,250 20,232 Z" fill="white" opacity="0.3"/>
  </g>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
