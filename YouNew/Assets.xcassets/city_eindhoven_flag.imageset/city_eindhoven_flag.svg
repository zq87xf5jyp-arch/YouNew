<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Eindhoven flag: red field with golden castle/fortress tower -->
  <rect width="300" height="200" fill="#B5121B"/>
  <!-- Castle tower (donjon) in gold -->
  <!-- Main tower body -->
  <rect x="112" y="70" width="76" height="90" rx="4" fill="#D4AF37"/>
  <!-- Battlements (merlons) on top of tower -->
  <rect x="108" y="52" width="18" height="22" rx="3" fill="#D4AF37"/>
  <rect x="132" y="52" width="18" height="22" rx="3" fill="#D4AF37"/>
  <rect x="156" y="52" width="18" height="22" rx="3" fill="#D4AF37"/>
  <rect x="180" y="52" width="18" height="22" rx="3" fill="#D4AF37"/>
  <!-- Castle gate (arched door) -->
  <path d="M135,160 L135,115 Q150,95 165,115 L165,160 Z" fill="#B5121B"/>
  <!-- Window left -->
  <rect x="120" y="88" width="16" height="20" rx="3" fill="#B5121B"/>
  <!-- Window right -->
  <rect x="164" y="88" width="16" height="20" rx="3" fill="#B5121B"/>
  <!-- Flanking towers (smaller) -->
  <rect x="70" y="95" width="44" height="65" rx="4" fill="#D4AF37"/>
  <rect x="186" y="95" width="44" height="65" rx="4" fill="#D4AF37"/>
  <!-- Small battlements on flanking towers -->
  <rect x="66" y="82" width="12" height="16" rx="2" fill="#D4AF37"/>
  <rect x="82" y="82" width="12" height="16" rx="2" fill="#D4AF37"/>
  <rect x="98" y="82" width="12" height="16" rx="2" fill="#D4AF37"/>
  <rect x="182" y="82" width="12" height="16" rx="2" fill="#D4AF37"/>
  <rect x="198" y="82" width="12" height="16" rx="2" fill="#D4AF37"/>
  <rect x="214" y="82" width="12" height="16" rx="2" fill="#D4AF37"/>
</svg>
