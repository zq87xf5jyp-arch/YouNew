<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Crown -->
  <rect x="43" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="91" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="139" y="0" width="18" height="14" rx="3" fill="#D4AF37"/>
  <rect x="38" y="10" width="124" height="12" rx="2" fill="#D4AF37"/>
  <!-- Shield: azure field -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="#003B8E" stroke="#5C3800" stroke-width="2.5"/>
  <!-- Gelderland eagle (golden) -->
  <ellipse cx="100" cy="138" rx="22" ry="27" fill="#D4AF37"/>
  <circle cx="100" cy="98" r="15" fill="#D4AF37"/>
  <!-- Simple crown on eagle -->
  <rect x="86" y="81" width="28" height="8" rx="2" fill="#D4AF37"/>
  <rect x="86" y="73" width="8" height="10" rx="2" fill="#D4AF37"/>
  <rect x="96" y="73" width="8" height="10" rx="2" fill="#D4AF37"/>
  <rect x="106" y="73" width="8" height="10" rx="2" fill="#D4AF37"/>
  <!-- Beak -->
  <path d="M112,96 L126,100 L112,104 Z" fill="#C8840A"/>
  <!-- Wings -->
  <path d="M78,126 Q46,108 30,118 Q46,134 78,140" fill="#D4AF37"/>
  <path d="M122,126 Q154,108 170,118 Q154,134 122,140" fill="#D4AF37"/>
  <!-- Tail feathers -->
  <path d="M82,162 L72,188 M100,165 L100,190 M118,162 L128,188" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
  <!-- Shield border -->
  <path d="M20,20 H180 V170 Q180,210 100,232 Q20,210 20,170 Z" fill="none" stroke="#8B6914" stroke-width="2.5"/>
</svg>
